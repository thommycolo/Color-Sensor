<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Color Reader</title>
    <!-- Link al CSS nella stessa cartella -->
    <link rel="stylesheet" href="style.css?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        
        <div class="card">
            <div class="header">
                <div class="icon">🎨</div>
                <h1>Rilevatore Colore</h1>
                <p>Monitoraggio remoto</p>
            </div>

            <!-- Sezione Colore (Sempre visibile) -->
            <div class="color-display-container">
                <div id="color-box" class="color-box"></div>
                
                <div class="rgb-values">
                    <div class="rgb-row"><span class="lbl">R:</span> <span id="val-r">--</span></div>
                    <div class="rgb-row"><span class="lbl">G:</span> <span id="val-g">--</span></div>
                    <div class="rgb-row"><span class="lbl">B:</span> <span id="val-b">--</span></div>
                </div>
            </div>

            <div class="color-name-box">
                <h2 id="color-name">In attesa...</h2>
            </div>

        </div>

        <div class="footer">
            ESP32 Color Reader Remote Viewer
        </div>
    </div>
    
    <script src="script.js?v=99"></script>
</body>
</html>
